# Pull-based stack: runs the published GHCR image instead of building locally.
#
#   PVE1_TOKEN_SECRET='your-token-secret' docker compose -f docker-compose.ghcr.yml up -d
#
# Pin a version with PVE_TAG (defaults to :latest):
#   PVE_TAG=0.1.0 PVE1_TOKEN_SECRET='...' docker compose -f docker-compose.ghcr.yml up -d
#
# Refresh images later with:  docker compose -f docker-compose.ghcr.yml pull
services:
  pve_exporter:
    image: ghcr.io/fjacquet/pve_exporter:${PVE_TAG:-latest}
    container_name: pve_exporter
    ports:
      - "9221:9221"
    volumes:
      - ./config.yaml:/etc/pve_exporter/config.yaml:ro
    environment:
      # Provide Proxmox VE connection details via the environment.
      # config.yaml references these as ${PVE1_HOST}, ${PVE1_TOKEN_ID}, ${PVE1_TOKEN_SECRET}.
      - PVE1_HOST=${PVE1_HOST:-10.0.0.1:8006}
      - PVE1_TOKEN_ID=${PVE1_TOKEN_ID:-exporter@pam!prometheus}
      - PVE1_TOKEN_SECRET=${PVE1_TOKEN_SECRET:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pve_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/pve.rules.yml:/etc/prometheus/pve.rules.yml:ro
    depends_on:
      - pve_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pve_grafana
    ports:
      - "3000:3000"
    environment:
      # Test-stack credentials (admin / admin). Change for anything non-local.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Datasource + dashboard providers (auto-provisioned on startup).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON files (one per dashboard in the suite).
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
